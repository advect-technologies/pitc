[Unit]
Description=MCC 134 Thermocouple Logger Service
After=network.target

[Service]
Type=simple
User=pi   
WorkingDirectory=/home/pi/pitc 
ExecStart=/home/pi/.local/bin/uv run main.py
Restart=always
RestartSec=5

# Logging goes to journalctl
StandardOutput=journal
StandardError=journal

# Run with slightly lower priority
Nice=10

# Increase open file limit slightly (good practice)
LimitNOFILE=4096

# Environment variables if needed
# Environment=PYTHONUNBUFFERED=1

[Install]
WantedBy=multi-user.target